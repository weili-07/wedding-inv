<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wei Li & Deborah | Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;600;700&family=Great+Vibes:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="home">
  <div id="intro-overlay" class="intro-overlay">
    <div class="intro-card">
      <p class="eyebrow" data-i18n="introEyebrow">A Cinematic Invitation</p>
      <h1 data-i18n="welcomeLine">Welcome to our Beginning</h1>
      <p class="muted" data-i18n="introSubtitle">A futuristic maker celebration for Wei Li and Deborah.</p>
      <button id="enter-site" class="btn btn-primary" data-i18n="enterInvitation">Enter Invitation</button>
    </div>
  </div>

  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <header class="site-header glass">
    <a class="logo" href="#home" data-i18n="welcomeLine">Welcome to our Beginning</a>
    <nav>
      <a href="#home" class="active" data-i18n="navHome">Home</a>
      <a href="#story" data-i18n="navStory">Details</a>
      <a href="#map" data-i18n="navMap">Map</a>
      <a href="#play" data-i18n="navPlay">Play & RSVP</a>
    </nav>
  </header>

  <main id="app-main"></main>

  <audio id="bg-music" loop preload="none">
    <source src="assets/music/song.mp3" type="audio/mpeg" />
  </audio>

  <label class="music-toggle" for="music-toggle" aria-label="Music toggle" title="Music On">
    <span class="music-icon" aria-hidden="true">♪</span>
    <input id="music-toggle" type="checkbox" role="switch" />
    <span class="music-slider" aria-hidden="true"></span>
  </label>

  <button id="lang-toggle" class="lang-toggle-btn" type="button">中文</button>

  <script src="app.js"></script>
  <script src="game.js"></script>
  <script src="router.js"></script>
</body>
</html>
